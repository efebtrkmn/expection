<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#f4f4f9;font-family:Arial,Helvetica,sans-serif">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr><td align="center" style="padding:40px 20px">
      <table width="600" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08)">
        <tr><td style="background:linear-gradient(135deg,#10b981,#059669);padding:32px;text-align:center">
          <div style="font-size:48px;margin-bottom:8px">✅</div>
          <h1 style="color:#fff;margin:0;font-size:22px">Ödemeniz Alındı</h1>
        </td></tr>
        <tr><td style="padding:40px">
          <p style="color:#374151;font-size:16px">Sayın <strong>{{customerName}}</strong>,</p>
          <p style="color:#6b7280;font-size:14px;line-height:1.6">Aşağıdaki ödemeniz başarıyla gerçekleştirilmiştir.</p>
          <table width="100%" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:20px;margin:24px 0">
            <tr><td style="color:#6b7280;font-size:13px">Fatura No</td><td align="right" style="color:#111827;font-weight:600">{{invoiceNumber}}</td></tr>
            <tr><td style="color:#6b7280;font-size:13px;padding-top:8px">Ödenen Tutar</td><td align="right" style="color:#059669;font-weight:700;font-size:20px;padding-top:8px">{{currency}} {{amount}}</td></tr>
            <tr><td style="color:#6b7280;font-size:13px;padding-top:8px">Tarih</td><td align="right" style="color:#374151;font-size:13px;padding-top:8px">{{paidAt}}</td></tr>
          </table>
          <p style="color:#9ca3af;font-size:12px">Teşekkür ederiz. Bu e-posta otomatik olarak oluşturulmuştur.</p>
        </td></tr>
        <tr><td style="background:#f9fafb;padding:16px;text-align:center;border-top:1px solid #e5e7eb">
          <p style="color:#9ca3af;font-size:12px;margin:0">Expection SaaS — Güvenli Muhasebe Platformu</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
